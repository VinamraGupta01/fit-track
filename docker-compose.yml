services:
  mysql:
    image: mysql:8.4
    container_name: fittrack-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fittrack_db}
      MYSQL_USER: ${MYSQL_USER:-fittrack}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fittrack123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: fittrack-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-fittrack_db}
      DB_USERNAME: ${MYSQL_USER:-fittrack}
      DB_PASSWORD: ${MYSQL_PASSWORD:-fittrack123}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_TO_A_LONG_256_BIT_SECRET_FOR_PRODUCTION}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    container_name: fittrack-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
